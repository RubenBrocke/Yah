<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Y Library Test</title>
</head>
<body>

  <!-- Component with y-init -->
  <div y-init="{ products = [{id: 0, name: 'product'}] }">
    <template id="t_product" lang="mustache">
      {{#products}}
      <li class="product">{{id}} - {{name}}</li>
      {{/products}}
    </template>

    <ul id="product_list" y="@products render #t_product insert ."></ul>

    <form y="@submit POST /api/products { products += response.product }">
      <input type="text" name="productName" placeholder="Product name">
      <button type="submit">Add Product</button>
    </form>
  </div>

  <!-- Include your library -->
  <script type="module" src="dist/yah.js"></script>
</html>
